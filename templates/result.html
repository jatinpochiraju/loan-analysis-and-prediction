<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Application Result</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('welcome') }}">LoanSys</a>
  </div>
</nav>
<div class="container">
    <div class="card">
      <div class="card-body">
        <h1 class="card-title">Loan Decision</h1>
        <p class="card-text">Name: {{ result.name }}</p>
        <p class="card-text">Gross Income: {{ result.gross }}</p>
        <p class="card-text">User Level: {{ result.level }}</p>
        <p class="card-text">Loan Approved: <strong>{{ 'Yes' if result.approved else 'No' }}</strong></p>
        <a href="{{ url_for('welcome') }}" class="btn btn-secondary">Back to home</a>
      </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
</body>
</html>
