{% extends 'base.html' %}
{% block title %}User Login | LoanShield{% endblock %}
{% block body %}
<main class="page auth-wrap">
  <section class="panel auth-panel">
    <h1>User Login</h1>
    <p>Access applicant workflows, submit applications, and view your insights dashboard.</p>
    <form method="post" class="form-rows">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label><span>Username</span><input name="username" required maxlength="30"></label>
      <label><span>Password</span><input type="password" name="password" required></label>
      <button class="btn" type="submit">Sign In</button>
      <a class="text-link" href="{{ url_for('register') }}">Need an account? Register</a>
    </form>
  </section>
</main>
{% endblock %}
