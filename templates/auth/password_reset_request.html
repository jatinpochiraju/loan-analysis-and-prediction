{% extends 'base.html' %}
{% block title %}Reset Password | LoanShield{% endblock %}
{% block body %}
<main class="page auth-wrap">
  <section class="panel auth-panel">
    <h1>Reset Password</h1>
    <p>Enter your recovery email to receive a 6-digit OTP through Gmail SMTP.</p>
    <form method="post" class="form-rows">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label><span>Recovery Email</span><input type="email" name="email" required maxlength="120" placeholder="name@example.com"></label>
      <button class="btn" type="submit">Send Recovery OTP</button>
      <a class="text-link" href="{{ url_for('user_login') }}">Back to user login</a>
    </form>
  </section>
</main>
{% endblock %}
